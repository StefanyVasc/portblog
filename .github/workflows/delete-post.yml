name: Delete Post

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug do post (ex: 2026-03-22-meu-post)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  delete:
    name: Delete "${{ inputs.slug }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Delete post
        run: npm run delete:post -- "${{ inputs.slug }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/posts/
          git diff --staged --quiet || git commit -m "Delete post \"${{ inputs.slug }}\""
          git push
